<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Fullscreen</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
    }

    #container {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    iframe {
        width: 100vw;
        height: 100vh;
        border: none;
    }

    #fullscreenBtn {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 12px 20px;
        font-size: 18px;
        border-radius: 8px;
        cursor: pointer;
        z-index: 9999;
    }
</style>

</head>
<body>

<button id="fullscreenBtn">Fullscreen</button>

<div id="container">
    <iframe id="gameFrame" src="gioco/index.html"></iframe>
</div>

<script>
    document.getElementById("fullscreenBtn").addEventListener("click", () => {
        const frame = document.getElementById("gameFrame");
        if (frame.requestFullscreen) frame.requestFullscreen();
        else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
        else if (frame.msRequestFullscreen) frame.msRequestFullscreen();
    });
</script>

</body>
</html>
