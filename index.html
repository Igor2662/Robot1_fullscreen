<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Fullscreen</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

/* Bottone fullscreen */
#fullscreenBtn {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 9999;
    padding: 10px 14px;
    font-size: 22px;
    border: none;
    border-radius: 10px;
    background: rgba(0,0,0,0.6);
    color: white;
    cursor: pointer;
}

/* Contenitore che gestisce lo scaling */
#frameWrapper {
    position: absolute;
    top: 0;
    left: 50%;
    width: 1600px;
    height: 900px;
    transform-origin: top center;
}

/* L’iframe contiene il gioco completo */
#gameFrame {
    width: 1600px;
    height: 900px;
    border: 0;
}
</style>
</head>

<body>

<!-- Bottone fullscreen -->
<button id="fullscreenBtn">⛶</button>

<!-- Contenitore con scaling -->
<div id="frameWrapper">
    <iframe id="gameFrame" src="gioco/index.html"></iframe>
</div>

<script>
// SCALING AUTOMATICO
function applyScaling() {
    const wrapper = document.getElementById("frameWrapper");
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    const baseW = 1600;
    const baseH = 900;

    const scale = Math.min(vw / baseW, vh / baseH);

    wrapper.style.transform = `translateX(-50%) scale(${scale})`;
}

window.addEventListener("load", applyScaling);
window.addEventListener("resize", applyScaling);

// FULLSCREEN
const fullscreenBtn = document.getElementById("fullscreenBtn");

fullscreenBtn.addEventListener("click", () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
});

// Cambia icona quando si entra/esce dal fullscreen
document.addEventListener("fullscreenchange", () => {
    fullscreenBtn.textContent = document.fullscreenElement ? "✕" : "⛶";
});
</script>

</body>
</html>
