<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Fullscreen</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
}

/* Bottone fullscreen */
#fullscreenBtn {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 9999;
    padding: 10px 14px;
    font-size: 22px;
    border: none;
    border-radius: 10px;
    background: rgba(0,0,0,0.6);
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

/* Contenitore fullscreen */
.fullscreen-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

/* Contenitore del gioco */
#gameContainer {
    position: absolute;
    top: 0;
    left: 50%;
    width: 1600px;
    height: 900px;
    transform-origin: top center;
}
</style>
</head>

<body>

<!-- Bottone fullscreen -->
<button id="fullscreenBtn">⛶</button>

<!-- Contenitore del gioco -->
<div class="fullscreen-container">
    <div id="gameContainer"></div>
</div>

<!-- Carica CSS e JS del gioco -->
<link rel="stylesheet" href="gioco/style.css">
<script src="gioco/script.js"></script>

<script>
// Inserisce l'HTML del gioco dentro gameContainer
fetch("gioco/index.html")
  .then(r => r.text())
  .then(html => {
      document.getElementById("gameContainer").innerHTML = html;
  });

// SCALING AUTOMATICO
function applyScaling() {
    const frame = document.getElementById("gameContainer");
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    const baseW = 1600;
    const baseH = 900;

    const scale = Math.min(vw / baseW, vh / baseH);

    frame.style.transform = `translateX(-50%) scale(${scale})`;
}

window.addEventListener("load", applyScaling);
window.addEventListener("resize", applyScaling);

// FULLSCREEN
const fullscreenBtn = document.getElementById("fullscreenBtn");

function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

fullscreenBtn.addEventListener("click", toggleFullscreen);

// Cambia icona quando si entra/esce dal fullscreen
document.addEventListener("fullscreenchange", () => {
    fullscreenBtn.textContent = document.fullscreenElement ? "✕" : "⛶";
});
</script>

</body>
</html>
