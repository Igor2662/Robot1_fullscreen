<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<!-- Zoom attivo ovunque -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

<title>Robot Fullscreen</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

/* DEBUG (disattivato) */
#deviceTest {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: white;
    padding: 8px 14px;
    border-radius: 8px;
    font-family: sans-serif;
    font-size: 14px;
    z-index: 9999;
    display: none;
}

/* Bottone fullscreen */
#fullscreenBtn {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 99999;
    padding: 12px 16px;
    font-size: 26px;
    border: none;
    border-radius: 12px;
    background: rgba(0,0,0,0.7);
    color: white;
    cursor: pointer;
}

/* Bottone impostazioni */
#settingsBtn {
    position: fixed;
    top: 15px;
    right: 70px;
    z-index: 99999;
    padding: 12px 16px;
    font-size: 26px;
    border: none;
    border-radius: 12px;
    background: rgba(0,0,0,0.7);
    color: white;
    cursor: pointer;
}

/* Sidebar impostazioni */
#settingsSidebar {
    position: fixed;
    top: 0;
    right: -320px;
    width: 320px;
    height: 100vh;
    background: #222;
    color: white;
    padding: 20px;
    box-shadow: -4px 0 12px rgba(0,0,0,0.4);
    z-index: 999999;
    transition: right 0.35s ease;
    font-family: sans-serif;
}

#settingsSidebar.open {
    right: 0;
}

#settingsSidebar input[type=range] {
    width: 100%;
}

/* Wrapper del gioco */
#frameWrapper {
    position: absolute;
    top: 0;
    left: 50%;
    width: 1600px;
    height: 900px;
    transform-origin: top center;
}

/* Iframe del gioco */
#gameFrame {
    width: 1600px;
    height: 900px;
    border: 0;
}

/* FULLSCREEN SIMULATO */
#fakeFullscreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: black;
    z-index: 99998;
    display: none;
    overflow: hidden;
}
</style>
</head>

<body>

<div id="deviceTest"></div>

<button id="fullscreenBtn">⛶</button>
<button id="settingsBtn">⚙️</button>

<!-- Sidebar impostazioni -->
<div id="settingsSidebar">
  <h2>⚙️ Impostazioni</h2>

  <label>Scala PC (normale)</label>
  <input type="range" id="scalePc" min="0.5" max="1.2" step="0.05">
  <span id="scalePcValue"></span>

  <br><br>

  <label>Scala PC (fullscreen)</label>
  <input type="range" id="scalePcFull" min="0.5" max="1.2" step="0.05">
  <span id="scalePcFullValue"></span>

  <br><br>

  <button id="closeSettings" style="
    margin-top: 20px;
    padding: 10px 14px;
    width: 100%;
  ">Chiudi</button>
</div>

<!-- Contenitore fullscreen simulato -->
<div id="fakeFullscreen"></div>

<!-- Contenitore del gioco -->
<div id="frameWrapper">
    <iframe id="gameFrame" src="gioco/index.html"></iframe>
</div>

<script>
let isFakeFullscreen = false;

/* -------------------- SCALING -------------------- */

function applyScaling() {

    const wrapper = document.getElementById("frameWrapper");

    const isFullscreenPage = isFakeFullscreen;

    const realWidth = screen.width;
    const realHeight = screen.height;
    const viewportWidth = window.innerWidth;
    const viewportHeight = window.innerHeight;

    const minSide = Math.min(realWidth, realHeight);
    const dpr = window.devicePixelRatio;
    const isPortrait = realHeight > realWidth;

    /* Smartphone */
    const scaleCellPortraitX_sites = 0.18;
    const scaleCellPortraitY_sites = 0.18;

    const scaleCellPortraitX_full = 0.22;
    const scaleCellPortraitY_full = 0.22;

    const scaleCellLandscapeX_sites = 0.32;
    const scaleCellLandscapeY_sites = 0.32;

    const scaleCellLandscapeX_full = 0.40;
    const scaleCellLandscapeY_full = 0.40;

    /* Tablet */
    const scaleTabletPortraitX_sites = 0.40;
    const scaleTabletPortraitY_sites = 0.40;

    const scaleTabletPortraitX_full = 0.50;
    const scaleTabletPortraitY_full = 0.50;

    const scaleTabletLandscapeX_sites = 0.60;
    const scaleTabletLandscapeY_sites = 0.60;

    const scaleTabletLandscapeX_full = 0.75;
    const scaleTabletLandscapeY_full = 0.75;

    /* PC — valori modificabili */
    let scalePC_sites_X = parseFloat(localStorage.getItem("scalePC_sites_X")) || 1.00;
    let scalePC_sites_Y = scalePC_sites_X;

    let scalePC_full_X = parseFloat(localStorage.getItem("scalePC_full_X")) || 1.00;
    let scalePC_full_Y = scalePC_full_X;

    /* RICONOSCIMENTO DISPOSITIVO */
    const isSmartphone = (minSide <= 500 && dpr >= 2);
    const isTablet = (minSide <= 1100 && dpr >= 1.5);
    const isPC = (!isSmartphone && !isTablet);

    let scaleX;
    let scaleY;

    /* SMARTPHONE */
    if (isSmartphone) {
        if (isPortrait) {
            scaleX = isFullscreenPage ? scaleCellPortraitX_full : scaleCellPortraitX_sites;
            scaleY = isFullscreenPage ? scaleCellPortraitY_full : scaleCellPortraitY_sites;
        } else {
            scaleX = isFullscreenPage ? scaleCellLandscapeX_full : scaleCellLandscapeX_sites;
            scaleY = isFullscreenPage ? scaleCellLandscapeY_full : scaleCellLandscapeY_sites;
        }
    }

    /* TABLET */
    else if (isTablet) {
        if (isPortrait) {
            scaleX = isFullscreenPage ? scaleTabletPortraitX_full : scaleTabletPortraitX_sites;
            scaleY = isFullscreenPage ? scaleTabletPortraitY_full : scaleTabletPortraitY_sites;
        } else {
            scaleX = isFullscreenPage ? scaleTabletLandscapeX_full : scaleTabletLandscapeX_sites;
            scaleY = isFullscreenPage ? scaleTabletLandscapeY_full : scaleTabletLandscapeY_sites;
        }
    }

    /* PC */
    else {
        scaleX = isFullscreenPage ? scalePC_full_X : scalePC_sites_X;
        scaleY = isFullscreenPage ? scalePC_full_Y : scalePC_sites_Y;
    }

    wrapper.style.transformOrigin = "top center";
    wrapper.style.transform = `translateX(-50%) scaleX(${scaleX}) scaleY(${scaleY})`;
}

window.addEventListener("load", applyScaling);
window.addEventListener("resize", applyScaling);

/* -------------------- FULLSCREEN SIMULATO -------------------- */

const fullscreenBtn = document.getElementById("fullscreenBtn");
const fakeFS = document.getElementById("fakeFullscreen");
const wrapper = document.getElementById("frameWrapper");

fullscreenBtn.addEventListener("click", () => {

    if (!isFakeFullscreen) {

        fakeFS.style.display = "block";
        fakeFS.appendChild(wrapper);
        fullscreenBtn.textContent = "✕";
        isFakeFullscreen = true;

        document.body.style.touchAction = "none";

        applyScaling();

    } else {

        fakeFS.style.display = "none";
        document.body.appendChild(wrapper);
        fullscreenBtn.textContent = "⛶";
        isFakeFullscreen = false;

        document.body.style.touchAction = "auto";

        applyScaling();
    }
});

/* -------------------- SIDEBAR IMPOSTAZIONI -------------------- */

const settingsBtn = document.getElementById("settingsBtn");
const settingsSidebar = document.getElementById("settingsSidebar");

const scalePcSlider = document.getElementById("scalePc");
const scalePcFullSlider = document.getElementById("scalePcFull");

const scalePcValue = document.getElementById("scalePcValue");
const scalePcFullValue = document.getElementById("scalePcFullValue");

const closeSettings = document.getElementById("closeSettings");

let scalePC_sites_X = parseFloat(localStorage.getItem("scalePC_sites_X")) || 1.00;
let scalePC_full_X  = parseFloat(localStorage.getItem("scalePC_full_X"))  || 1.00;

scalePcSlider.value = scalePC_sites_X;
scalePcFullSlider.value = scalePC_full_X;

scalePcValue.textContent = scalePC_sites_X;
scalePcFullValue.textContent = scalePC_full_X;

settingsBtn.addEventListener("click", () => {
    settingsSidebar.classList.add("open");
});

closeSettings.addEventListener("click", () => {
    settingsSidebar.classList.remove("open");
});

scalePcSlider.addEventListener("input", () => {
    scalePcValue.textContent = scalePcSlider.value;
    localStorage.setItem("scalePC_sites_X", scalePcSlider.value);
    applyScaling();
});

scalePcFullSlider.addEventListener("input", () => {
    scalePcFullValue.textContent = scalePcFullSlider.value;
    localStorage.setItem("scalePC_full_X", scalePcFullSlider.value);
    applyScaling();
});
</script>

</body>
</html>
