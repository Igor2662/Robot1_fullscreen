<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Robot Fullscreen</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

/* 🔍 DEBUG — disattivato di default */
#deviceTest {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: white;
    padding: 8px 14px;
    border-radius: 8px;
    font-family: sans-serif;
    font-size: 14px;
    z-index: 9999;
    text-align: center;
    display: none; /* ← disattiva debug */
    /* display: block; */ /* ← ATTIVA debug */
}

/* Bottone fullscreen */
#fullscreenBtn {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 99999;
    padding: 12px 16px;
    font-size: 26px;
    border: none;
    border-radius: 12px;
    background: rgba(0,0,0,0.7);
    color: white;
    cursor: pointer;
    touch-action: manipulation;
}

/* Contenitore che gestisce lo scaling */
#frameWrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: 1600px;
    height: 900px;
    transform-origin: top left;
}

/* Iframe del gioco */
#gameFrame {
    width: 1600px;
    height: 900px;
    border: 0;
}
</style>
</head>

<body>

<!-- DEBUG -->
<div id="deviceTest"></div>

<!-- Bottone fullscreen -->
<button id="fullscreenBtn">⛶</button>

<!-- Contenitore con scaling -->
<div id="frameWrapper">
    <iframe id="gameFrame" src="gioco/index.html"></iframe>
</div>

<script>
function applyScaling() {

    const wrapper = document.getElementById("frameWrapper");
    const testBox = document.getElementById("deviceTest");

    /* 📌 Riconosce se siamo nella pagina fullscreen o dentro Google Sites */
    const isFullscreenPage = window.location.pathname.endsWith("index.html");

    const realWidth = screen.width;
    const realHeight = screen.height;
    const viewportWidth = window.innerWidth;
    const viewportHeight = window.innerHeight;

    const minSide = Math.min(realWidth, realHeight);
    const dpr = window.devicePixelRatio;
    const isPortrait = realHeight > realWidth;

    /* 🎯 SCALING PERSONALIZZATO PER IL TUO GIOCO (1600×900) */

    /* SMARTPHONE */
    const scaleCellPortraitX_sites = 0.18;
    const scaleCellPortraitY_sites = 0.18;

    const scaleCellPortraitX_full = 0.22;
    const scaleCellPortraitY_full = 0.22;

    const scaleCellLandscapeX_sites = 0.32;
    const scaleCellLandscapeY_sites = 0.32;

    const scaleCellLandscapeX_full = 0.40;
    const scaleCellLandscapeY_full = 0.40;

    /* TABLET */
    const scaleTabletPortraitX_sites = 0.40;
    const scaleTabletPortraitY_sites = 0.40;

    const scaleTabletPortraitX_full = 0.50;
    const scaleTabletPortraitY_full = 0.50;

    const scaleTabletLandscapeX_sites = 0.60;
    const scaleTabletLandscapeY_sites = 0.60;

    const scaleTabletLandscapeX_full = 0.75;
    const scaleTabletLandscapeY_full = 0.75;

    /* PC */
    const scalePC_sites_X = 0.80;
    const scalePC_sites_Y = 0.80;

    const scalePC_full_X = 1.00;
    const scalePC_full_Y = 1.00;

    /* SOGLIE DI RICONOSCIMENTO */
    const isSmartphone = (minSide <= 500 && dpr >= 2);
    const isTablet = (minSide <= 1100 && dpr >= 1.5);
    const isPC = (!isSmartphone && !isTablet);

    let scaleX;
    let scaleY;
    let deviceType;

    /* SMARTPHONE */
    if (isSmartphone) {

        deviceType = isPortrait ? "📱 Cell verticale" : "📱 Cell orizzontale";

        if (isPortrait) {
            scaleX = isFullscreenPage ? scaleCellPortraitX_full : scaleCellPortraitX_sites;
            scaleY = isFullscreenPage ? scaleCellPortraitY_full : scaleCellPortraitY_sites;
        } else {
            scaleX = isFullscreenPage ? scaleCellLandscapeX_full : scaleCellLandscapeX_sites;
            scaleY = isFullscreenPage ? scaleCellLandscapeY_full : scaleCellLandscapeY_sites;
        }
    }

    /* TABLET */
    else if (isTablet) {

        deviceType = isPortrait ? "📲 Tablet verticale" : "📲 Tablet orizzontale";

        if (isPortrait) {
            scaleX = isFullscreenPage ? scaleTabletPortraitX_full : scaleTabletPortraitX_sites;
            scaleY = isFullscreenPage ? scaleTabletPortraitY_full : scaleTabletPortraitY_sites;
        } else {
            scaleX = isFullscreenPage ? scaleTabletLandscapeX_full : scaleTabletLandscapeX_sites;
            scaleY = isFullscreenPage ? scaleTabletLandscapeY_full : scaleTabletLandscapeY_sites;
        }
    }

    /* PC */
    else {

        deviceType = "💻 PC";

        scaleX = isFullscreenPage ? scalePC_full_X : scalePC_sites_X;
        scaleY = isFullscreenPage ? scalePC_full_Y : scalePC_sites_Y;
    }

    /* 🎯 CENTRATURA PERFETTA CON SCALING SEPARATO */

    const baseW = 1600;
    const baseH = 900;

    const scaledW = baseW * scaleX;
    const scaledH = baseH * scaleY;

    const leftOffset = (viewportWidth - scaledW) / 2;

    wrapper.style.transformOrigin = "top left";
    wrapper.style.transform = `scaleX(${scaleX}) scaleY(${scaleY})`;
    wrapper.style.left = `${leftOffset}px`;

    /* DEBUG */
    testBox.innerHTML = `
        <strong>${deviceType}</strong><br>
        Fullscreen page: ${isFullscreenPage}<br>
        scaleX: ${scaleX}<br>
        scaleY: ${scaleY}<br>
        scaledW: ${scaledW}<br>
        leftOffset: ${leftOffset}<br>
        minSide: ${minSide}px<br>
        DPR: ${dpr}<br>
        Schermo reale: ${realWidth} x ${realHeight}<br>
        Viewport: ${viewportWidth} x ${viewportHeight}
    `;
}

window.addEventListener("load", applyScaling);
window.addEventListener("resize", applyScaling);

/* FULLSCREEN */
const fullscreenBtn = document.getElementById("fullscreenBtn");

fullscreenBtn.addEventListener("click", () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
});

/* Cambia icona quando si entra/esce dal fullscreen */
document.addEventListener("fullscreenchange", () => {
    fullscreenBtn.textContent = document.fullscreenElement ? "✕" : "⛶";
});
</script>

</body>
</html>
