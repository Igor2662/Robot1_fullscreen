<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

<title>Robot Fullscreen</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

/* 🔍 DEBUG — disattivato di default */
#deviceTest {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: white;
    padding: 8px 14px;
    border-radius: 8px;
    font-family: sans-serif;
    font-size: 14px;
    z-index: 9999;
    text-align: center;
    display: none;
}

/* Bottone fullscreen */
#fullscreenBtn {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 99999;
    padding: 12px 16px;
    font-size: 26px;
    border: none;
    border-radius: 12px;
    background: rgba(0,0,0,0.7);
    color: white;
    cursor: pointer;
    touch-action: manipulation;
}

/* Contenitore che gestisce lo scaling */
#frameWrapper {
    position: absolute;
    top: 0;
    left: 50%;
    width: 1600px;
    height: 900px;
    transform-origin: top center;
}

/* Iframe del gioco */
#gameFrame {
    width: 1600px;
    height: 900px;
    border: 0;
}
</style>
</head>

<body>

<div id="deviceTest"></div>

<button id="fullscreenBtn">⛶</button>

<div id="frameWrapper">
    <iframe id="gameFrame" src="gioco/index.html"></iframe>
</div>

<script>
function applyScaling() {
    const wrapper = document.getElementById("frameWrapper");
    const testBox = document.getElementById("deviceTest");

    /* 📌 Riconosce se siamo nella pagina fullscreen o dentro Google Sites */
    const isFullscreenPage = window.location.pathname.endsWith("index.html");

    const realWidth = screen.width;
    const realHeight = screen.height;
    const viewportWidth = window.innerWidth;
    const viewportHeight = window.innerHeight;

    const minSide = Math.min(realWidth, realHeight);
    const dpr = window.devicePixelRatio;
    const isPortrait = realHeight > realWidth;

    /* 🎯 SCALING PERSONALIZZATO PER IL TUO GIOCO (1600×900) */

    /* SMARTPHONE */
    const scaleCellPortrait_sites = 0.18;
    const scaleCellPortrait_full = 0.22;

    const scaleCellLandscape_sites = 0.32;
    const scaleCellLandscape_full = 0.40;

    /* TABLET */
    const scaleTabletPortrait_sites = 0.40;
    const scaleTabletPortrait_full = 0.50;

    const scaleTabletLandscape_sites = 0.60;
    const scaleTabletLandscape_full = 0.75;

    /* PC */
    const scalePC_sites_X = 0.80;
    const scalePC_sites_Y = 0.80;

    const scalePC_full_X = 1.00;
    const scalePC_full_Y = 1.00;

    /* SOGLIE DI RICONOSCIMENTO */
    const isSmartphone = (minSide <= 500 && dpr >= 2);
    const isTablet = (minSide <= 1100 && dpr >= 1.5);
    const isPC = (!isSmartphone && !isTablet);

    let scaleX, scaleY, deviceType;

    if (isSmartphone) {
        deviceType = isPortrait ? "📱 Cell verticale" : "📱 Cell orizzontale";
        if (isPortrait) {
            scaleX = isFullscreenPage ? scaleCellPortrait_full : scaleCellPortrait_sites;
            scaleY = isFullscreenPage ? scaleCellPortrait_full : scaleCellPortrait_sites;
        } else {
            scaleX = isFullscreenPage ? scaleCellLandscape_full : scaleCellLandscape_sites;
            scaleY = isFullscreenPage ? scaleCellLandscape_full : scaleCellLandscape_sites;
        }
    } else if (isTablet) {
        deviceType = isPortrait ? "📲 Tablet verticale" : "📲 Tablet orizzontale";
        if (isPortrait) {
            scaleX = isFullscreenPage ? scaleTabletPortrait_full : scaleTabletPortrait_sites;
            scaleY = isFullscreenPage ? scaleTabletPortrait_full : scaleTabletPortrait_sites;
        } else {
            scaleX = isFullscreenPage ? scaleTabletLandscape_full : scaleTabletLandscape_sites;
            scaleY = isFullscreenPage ? scaleTabletLandscape_full : scaleTabletLandscape_sites;
        }
    } else {
        deviceType = "💻 PC";
        scaleX = isFullscreenPage ? scalePC_full_X : scalePC_sites_X;
        scaleY = isFullscreenPage ? scalePC_full_Y : scalePC_sites_Y;
    }

    /* APPLICAZIONE DELLO SCALING */
    wrapper.style.transform = `translateX(-50%) scaleX(${scaleX}) scaleY(${scaleY})`;

    testBox.innerHTML = `
        <strong>${deviceType}</strong><br>
        Fullscreen page: ${isFullscreenPage}<br>
        scaleX: ${scaleX}<br>
        scaleY: ${scaleY}<br>
        minSide: ${minSide}px<br>
        DPR: ${dpr}<br>
        Schermo reale: ${realWidth} x ${realHeight}<br>
        Viewport: ${viewportWidth} x ${viewportHeight}
    `;
}

/* Forza scaling multiplo su mobile per garantire zoom corretto */
function applyScalingWithDelay() {
    applyScaling();
    setTimeout(applyScaling, 200);
    setTimeout(applyScaling, 500);
    setTimeout(applyScaling, 1000);
}

window.addEventListener("load", applyScalingWithDelay);
window.addEventListener("resize", applyScalingWithDelay);

/* FULLSCREEN */
const fullscreenBtn = document.getElementById("fullscreenBtn");

fullscreenBtn.addEventListener("click", () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
});

/* Cambia icona quando si entra/esce dal fullscreen */
document.addEventListener("fullscreenchange", () => {
    fullscreenBtn.textContent = document.fullscreenElement ? "✕" : "⛶";
});
</script>

</body>
</html>
