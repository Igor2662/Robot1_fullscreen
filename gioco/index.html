<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Costruisci la parola — Versione B (Scratch-style)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="celebrationOverlay">
      <div id="celebrationContent">
          <h1 id="celebrationText">COMPLIMENTI!</h1>
          <img id="celebrationImage" src="" alt="Celebration Image">
      </div>
  </div>

  <h1>
    <span id="titleStatic">Costruisci la parola:</span>
    <span id="targetWord">CASA</span>
    <span id="storyText" style="display:none">Storia...</span>
  </h1>

  <div id="mainContainer">
    <div id="leftPanel">
      <div id="collectedWord" class="letter-row"></div>
      <div id="grid" aria-hidden="false"></div>
      <p id="message" role="status" aria-live="polite"></p>
    </div>

    <div id="rightPanel">

      <div class="level-header">
        <h3>Seleziona livello <button id="helpBtn">❓ Help</button></h3>
      </div>

      <div class="level-switch">
        <button id="btnLevel1">🔵 Livello 1 – Comandi manuali</button>
        <button id="btnLevel2">🟢 Livello 2 – Percorso programmato</button>
        <button id="btnLevel3">🟣 Livello 3 – Sequenza di icone</button>
        <button id="btnLevel4">🟠 Livello 4 – Percorso robot</button>
      </div>


      <!-- LIVELLO 1 -->
      <div id="level1" class="level" style="display:none; margin-top:12px;">
        <h3>Comandi Manuali</h3>
        <div class="manual-controls-grid">
          <button class="big-btn" onclick="moveRight(1)">➡️</button>
          <button class="big-btn" onclick="moveLeft(1)">⬅️</button>
          <button class="big-btn" onclick="moveUp(1)">⬆️</button>
          <button class="big-btn" onclick="moveDown(1)">⬇️</button>
          <button class="big-btn" onclick="jump(2)">⤴️</button>
          <button class="big-btn" onclick="rotate('R')">↻ <span class="small-text">D</span></button>
          <button class="big-btn" onclick="rotate('L')">↺ <span class="small-text">S</span></button>
          <button class="big-btn" onclick="destroyTrapStep()">💣</button>
        </div>
		<button id="newWordBtnL1" style="margin-top:12px;">Nuova parola</button>

      </div>

      <!-- LIVELLO 2 -->
      <div id="level2" class="level" style="display:none; margin-top:12px;">
        <h3>Costruisci sequenza (trascina i blocchi)</h3>

        <div id="toolbox" class="toolbox"></div>

        <h4>Sequenza (trascina qui sotto)</h4>
        <div id="sequence" class="sequence"></div>

        <div class="seq-buttons">
          <button id="runSeq">▶️ Esegui sequenza</button>
          <button id="runSeqBomb">💣 Esegui sequenza con bomba</button>
          <button id="clearSeq">❌ Svuota sequenza</button>
          <button id="newWordBtn">Nuova parola</button>
          <button id="importWords">Importa parole</button>
          <input type="file" id="wordFile" accept="application/json" style="display:none">
        </div>

      </div>

      <!-- LIVELLO 3 -->
      <div id="level3" class="level" style="display:none; margin-top:12px;">
        <h3>Costruisci sequenza di icone</h3>

        <div id="iconToolbox" class="toolbox"></div>

        <h4>Sequenza icone (trascina qui sotto)</h4>
        <div id="iconSequence" class="sequence"></div>

        <div class="seq-buttons">
          <button id="runSeqIcons">▶️ Esegui sequenza</button>
          <button id="runSeqBombIcons">💣 Esegui sequenza con bomba</button>
          <button id="clearSeqIcons">❌ Svuota sequenza</button>
          <button id="newIconSeqBtn">Nuova sequenza</button>
          <button id="importIcons">Importa icone</button>
          <input type="file" id="iconFile" accept="application/json" style="display:none">
        </div>
      </div>
	  
      <!-- LIVELLO 4 -->
      <div id="level4" class="level" style="display:none; margin-top:12px;">
        <h3>Programma il robot per seguire il percorso</h3>

        <div id="pathToolbox" class="toolbox"></div>

        <h4>Sequenza robot</h4>
        <div id="pathSequence" class="sequence"></div>

        <div class="seq-buttons">
          <button id="runPath">▶️ Esegui percorso</button>
          <button id="clearPath">❌ Svuota sequenza</button>
          <button id="newPathLevel">Nuovo livello</button>
          <button id="importPaths">Importa livelli</button>
		  <button id="randomPath">Percorso casuale</button>
          <input type="file" id="pathFile" accept="application/json" style="display:none">
        </div>
      </div>
	  

      <hr>
      <div class="settings">
        <label>Trappole livello 2: <input id="trapCount" type="number" min="0" max="40" value="6"></label>
        <button id="regenTraps">Rigenera trappole</button>
      </div>

      <br>
      <button id="resetBtn">Reset completo</button>
    </div>
  </div>

<!-- SortableJS CDN -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<!-- POPUP HELP (DEVE STARE PRIMA DELLO SCRIPT PRINCIPALE) -->
<div id="helpPopup" style="
  display:none;
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%, -50%);
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  z-index:999999;
  max-width:400px;
  font-size:18px;
">
  <div id="helpContent"></div>
  <button id="closeHelp" style="margin-top:15px;">Chiudi</button>
</div>

<script src="script.js"></script>

<div id="trash" style="width:0;height:0;overflow:hidden;"></div>

</body>
</html>
